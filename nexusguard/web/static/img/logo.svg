<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield outline -->
  <path d="M100 20 L170 50 L170 110 Q170 150 100 180 Q30 150 30 110 L30 50 Z" 
        fill="url(#shieldGradient)" 
        filter="url(#glow)"
        stroke="#ffffff" 
        stroke-width="3"/>
  
  <!-- Lock icon -->
  <rect x="80" y="90" width="40" height="35" rx="3" fill="#ffffff" opacity="0.9"/>
  <path d="M85 90 L85 75 Q85 65 100 65 Q115 65 115 75 L115 90" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="6" 
        opacity="0.9"/>
  
  <!-- Hexagon pattern -->
  <g opacity="0.2" stroke="#ffffff" stroke-width="1" fill="none">
    <polygon points="100,40 110,45 110,55 100,60 90,55 90,45"/>
    <polygon points="50,70 60,75 60,85 50,90 40,85 40,75"/>
    <polygon points="150,70 160,75 160,85 150,90 140,85 140,75"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" 
        fill="#6366f1" text-anchor="middle">NEXUSGUARD</text>
</svg>
